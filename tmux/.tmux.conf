set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on

# Uncomment this line if you have problems with Shift+arrows
# set -g default-terminal "xterm-256color"

set -g status-left-length 100

unbind -n WheelUpPane
unbind -n WheelDownPane

bind -n WheelUpPane if-shell -F '#{mouse_any_flag}' \
  'send-keys -M' \
  'if-shell -F "#{alternate_on}" "send-keys Up" "copy-mode -e"'

bind -n WheelDownPane if-shell -F '#{mouse_any_flag}' \
  'send-keys -M' \
  'if-shell -F "#{alternate_on}" "send-keys Down" ""'

bind h split-window -h
bind v split-window -v

bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

bind -n M-` select-pane -t :.+
bind -n M-~ select-pane -t :.-

bind -n F11 resize-pane -Z

bind q confirm-before -p "Kill current session? (y/n)" kill-session

# Session chooser: same style as the standard one, but sorted by name
bind-key s choose-tree -Zs -O name

# F1: show help in tree mode, otherwise pass F1 through to the pane
bind-key -n F1 if-shell -F '#{==:#{pane_mode},tree-mode}' \
  'display-popup -w 70% -h 60% "sh -c '\''cat <<\"EOF\"
tmux tree mode

Enter  choose selected item
Up/Down  move
+ / -  expand / collapse
x      kill selected item
X      kill tagged items
< / >  scroll previews
C-s    search by name
n / N  repeat search
t      tag item
T      untag all
:      command on tagged items
f      filter
H      jump to starting pane
O      change sort field
r      reverse sort
v      toggle preview
q      quit

Press Esc to close this help
EOF
'\''"' \
  'send-keys F1'
