[mgr]

[[mgr.prepend_keymap]]
on   = ["<Enter>"]
run  = "plugin --sync enter-cd-quit"
desc = "Enter dir -> cd+quit; file -> open (stay)"

[[mgr.prepend_keymap]]
on   = ["q"]
run  = "quit --no-cwd-file"
desc = "Quit without cd"

[[mgr.prepend_keymap]]
on   = ["<C-q>"]
run  = "quit --no-cwd-file"
desc = "Quit without cd"
